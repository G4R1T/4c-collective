<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>4C | Lead Intake & Follow-Up Systems</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      color: #1f2933;
      background: #f8fafc;
      line-height: 1.6;
    }
    a { text-decoration: none; color: inherit; }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 40px;
      background: #ffffff;
      box-shadow: 0 2px 12px rgba(15, 23, 42, 0.08);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      color: #0f766e;
    }
    .nav-cta {
      background: #0f766e;
      color: #ffffff;
      padding: 10px 20px;
      border-radius: 999px;
      font-weight: 600;
      transition: 0.25s ease;
    }
    .nav-cta:hover { background: #115e59; }

    .hero {
      background: linear-gradient(135deg, #effcf9 0%, #f8fafc 55%, #ecfeff 100%);
      padding: 110px 24px 90px;
      text-align: center;
    }
    .hero-inner {
      max-width: 900px;
      margin: 0 auto;
    }
    .eyebrow {
      display: inline-block;
      margin-bottom: 18px;
      padding: 8px 14px;
      border-radius: 999px;
      background: #ccfbf1;
      color: #0f766e;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    .hero h1 {
      font-size: clamp(2.2rem, 5vw, 4.2rem);
      line-height: 1.08;
      font-weight: 800;
      color: #102a43;
      margin-bottom: 18px;
    }
    .hero h1 span { color: #0f766e; }
    .hero p {
      font-size: 1.1rem;
      color: #486581;
      max-width: 720px;
      margin: 0 auto 34px;
    }
    .hero-btns {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn-primary, .btn-secondary {
      display: inline-block;
      padding: 15px 28px;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 700;
      transition: 0.25s ease;
    }
    .btn-primary {
      background: #0f766e;
      color: #ffffff;
      box-shadow: 0 12px 24px rgba(15, 118, 110, 0.18);
    }
    .btn-primary:hover {
      background: #115e59;
      transform: translateY(-2px);
    }
    .btn-secondary {
      border: 2px solid #0f766e;
      color: #0f766e;
      background: transparent;
    }
    .btn-secondary:hover {
      background: #e6fffb;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(180px, 1fr));
      gap: 20px;
      max-width: 1080px;
      margin: -36px auto 0;
      padding: 0 24px;
      position: relative;
      z-index: 2;
    }
    .stat {
      background: #ffffff;
      border-radius: 22px;
      padding: 28px 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      border: 1px solid #e6edf3;
    }
    .stat h2 {
      font-size: 2rem;
      color: #0f766e;
      margin-bottom: 6px;
    }
    .stat p {
      color: #52606d;
      font-size: 0.98rem;
    }

    .section {
      padding: 90px 24px;
    }
    .section-inner {
      max-width: 1120px;
      margin: 0 auto;
    }
    .section h2 {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      text-align: center;
      color: #102a43;
      margin-bottom: 14px;
    }
    .section-sub {
      text-align: center;
      color: #61758a;
      max-width: 760px;
      margin: 0 auto 48px;
      font-size: 1.05rem;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 20px;
    }
    .card {
      background: #ffffff;
      padding: 28px 22px;
      border-radius: 22px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.06);
      border: 1px solid #e6edf3;
    }
